<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Most Likely To… | Molly & Reid</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .progress-wrap {
      margin-bottom: 20px;
    }
    .progress-label {
      font-size: 12px;
      color: var(--text-light);
      text-align: center;
      margin-bottom: 8px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .progress-track {
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--gold);
      border-radius: 3px;
      transition: width 0.3s ease;
    }
    .single-card {
      background: white;
      border-radius: var(--radius);
      padding: 32px 24px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      margin-bottom: 16px;
      text-align: center;
    }
    .single-card .q-number {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--gold);
      color: white;
      border-radius: 50%;
      width: 32px;
      height: 32px;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 16px;
    }
    .single-card .q-body {
      font-size: 20px;
      font-family: 'Playfair Display', Georgia, serif;
      font-weight: 700;
      line-height: 1.4;
      margin-bottom: 28px;
      color: var(--text);
    }
    .big-vote-row {
      display: flex;
      gap: 12px;
    }
    .big-vote-btn {
      flex: 1;
      padding: 20px 8px;
      border-radius: 12px;
      border: 2px solid transparent;
      cursor: pointer;
      font-size: 16px;
      font-weight: 700;
      font-family: inherit;
      transition: all 0.15s;
    }
    .big-vote-btn.molly {
      background: var(--molly-light);
      border-color: var(--molly-light);
      color: var(--molly);
    }
    .big-vote-btn.molly.selected,
    .big-vote-btn.molly:active {
      background: var(--molly);
      border-color: var(--molly);
      color: white;
    }
    .big-vote-btn.reid {
      background: var(--reid-light);
      border-color: var(--reid-light);
      color: var(--reid);
    }
    .big-vote-btn.reid.selected,
    .big-vote-btn.reid:active {
      background: var(--reid);
      border-color: var(--reid);
      color: white;
    }
    .review-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 0;
    }
    .review-icon { font-size: 64px; margin-bottom: 16px; }
    .review-title {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 26px;
      margin-bottom: 10px;
    }
    .review-text {
      color: var(--text-light);
      font-size: 15px;
      line-height: 1.6;
      max-width: 280px;
      margin-bottom: 28px;
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="index.html" class="back-link">← Back</a>

    <!-- Screen 1: Name entry -->
    <div id="screen-name" class="screen active">
      <div class="page-header">
        <span class="icon">🗳️</span>
        <h1>Most Likely To…</h1>
        <p class="subtitle">Vote for Molly or Reid on 15 questions</p>
      </div>
      <div class="card">
        <div class="form-group">
          <label for="player-name">Your Name</label>
          <input type="text" id="player-name" placeholder="Enter your name" autocomplete="given-name" autocorrect="off">
        </div>
        <button class="submit-btn" onclick="startGame()">Let’s Play! →</button>
        <div id="name-error" class="error"></div>
      </div>
    </div>

    <!-- Screen 2: One question at a time -->
    <div id="screen-questions" class="screen">
      <div class="progress-wrap">
        <div class="progress-label" id="progress-label">Question 1 of 15</div>
        <div class="progress-track">
          <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
        </div>
      </div>

      <div class="single-card">
        <div class="q-number" id="q-number">1</div>
        <div class="q-body" id="q-body"></div>
        <div class="big-vote-row">
          <button class="big-vote-btn molly" id="btn-molly" onclick="vote('Molly')">💕 Molly</button>
          <button class="big-vote-btn reid" id="btn-reid" onclick="vote('Reid')">🤵 Reid</button>
        </div>
      </div>
    </div>

    <!-- Screen 3: Confirm & submit -->
    <div id="screen-review" class="screen">
      <div class="review-wrap">
        <div class="review-icon">🗳️</div>
        <h2 class="review-title">All 15 answered!</h2>
        <p class="review-text">Ready to lock in your votes for Molly & Reid?</p>
        <button class="submit-btn" id="submit-btn" onclick="submitVotes()">Submit My Votes</button>
        <div id="submit-error" class="error"></div>
      </div>
    </div>

    <!-- Screen 4: Success -->
    <div id="screen-success" class="screen">
      <div class="success-wrap">
        <div class="success-icon">🎉</div>
        <h2 class="success-title">Votes Submitted!</h2>
        <p class="success-text">Thanks for playing! The host will share the results after everyone votes.</p>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script>
    const QUESTIONS = [
      "Who is best at keeping secrets?",
      "Better cook?",
      "More likely to be running late?",
      "Most likely to get lost?",
      "Who made the first move?",
      "Better caretaker when the other is sick?",
      "Crazier family?",
      "More likely to talk their way out of a speeding ticket?",
      "Wakes up earliest?",
      "Will spend more time on the dance floor at the wedding?",
      "Who makes the most plans?",
      "Who is more forgetful?",
      "Likes reality TV more?",
      "Better dancer?",
      "Spends more time on their phone?"
    ];

    let playerName = '';
    let answers = {};
    let currentIndex = 0;
    let db;

    try {
      firebase.initializeApp(firebaseConfig);
      db = firebase.database();
    } catch (e) {
      console.error('Firebase init error:', e);
    }

    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    function startGame() {
      playerName = document.getElementById('player-name').value.trim();
      if (!playerName) {
        document.getElementById('name-error').textContent = 'Please enter your name to continue.';
        return;
      }
      currentIndex = 0;
      showQuestion();
      showScreen('screen-questions');
    }

    function showQuestion() {
      const total = QUESTIONS.length;
      document.getElementById('progress-label').textContent = `Question ${currentIndex + 1} of ${total}`;
      document.getElementById('progress-fill').style.width = `${(currentIndex / total) * 100}%`;
      document.getElementById('q-number').textContent = currentIndex + 1;
      document.getElementById('q-body').textContent = QUESTIONS[currentIndex];

      const mollyBtn = document.getElementById('btn-molly');
      const reidBtn  = document.getElementById('btn-reid');
      mollyBtn.classList.remove('selected');
      reidBtn.classList.remove('selected');
      mollyBtn.disabled = false;
      reidBtn.disabled  = false;

      if (answers[currentIndex] === 'Molly') mollyBtn.classList.add('selected');
      if (answers[currentIndex] === 'Reid')  reidBtn.classList.add('selected');
    }

    function vote(person) {
      answers[currentIndex] = person;

      const mollyBtn = document.getElementById('btn-molly');
      const reidBtn  = document.getElementById('btn-reid');
      mollyBtn.classList.toggle('selected', person === 'Molly');
      reidBtn.classList.toggle('selected',  person === 'Reid');
      mollyBtn.disabled = true;
      reidBtn.disabled  = true;

      setTimeout(() => {
        currentIndex++;
        if (currentIndex < QUESTIONS.length) {
          showQuestion();
        } else {
          document.getElementById('progress-fill').style.width = '100%';
          showScreen('screen-review');
        }
      }, 400);
    }

    async function submitVotes() {
      if (!db) {
        document.getElementById('submit-error').textContent = 'Firebase not set up yet — check firebase-config.js.';
        return;
      }

      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      btn.textContent = 'Submitting…';

      try {
        const key = playerName.toLowerCase().replace(/\s+/g, '_').replace(/[^a-z0-9_]/g, '');
        await db.ref(`selection_votes/${key}`).set({
          name: playerName,
          answers: answers,
          submittedAt: Date.now()
        });
        showScreen('screen-success');
      } catch (e) {
        document.getElementById('submit-error').textContent = 'Submission failed — please try again.';
        btn.disabled = false;
        btn.textContent = 'Submit My Votes';
        console.error(e);
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('player-name').addEventListener('keypress', e => {
        if (e.key === 'Enter') startGame();
      });
    });
  </script>
</body>
</html>
